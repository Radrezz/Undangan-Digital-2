<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Undangan | Romeo & Juliet</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #f9f6e5;
            --text-primary: #8c704f;
            --accent-gold: #bf9563;
            --pure-white: #ffffff;
            --pure-black: #000000;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Outfit', sans-serif;
            --shadow: 0 20px 50px rgba(140, 112, 79, 0.15);
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
        }

        .generator-container {
            background: var(--pure-white);
            padding: 50px;
            border-radius: 2px;
            box-shadow: var(--shadow);
            max-width: 600px;
            width: 100%;
            position: relative;
            border: 1px solid rgba(140, 112, 79, 0.2);
        }

        .generator-container::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(140, 112, 79, 0.1);
            pointer-events: none;
        }

        h2 {
            font-family: var(--font-serif);
            color: var(--text-primary);
            text-align: center;
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p.subtitle {
            text-align: center;
            color: var(--accent-gold);
            margin-bottom: 40px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(140, 112, 79, 0.2);
            background: #fafafa;
            border-radius: 0;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
            color: var(--text-primary);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: var(--pure-white);
        }

        button.btn-generate {
            width: 100%;
            padding: 18px;
            background-color: var(--text-primary);
            color: var(--pure-white);
            border: none;
            border-radius: 0;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button.btn-generate:hover {
            background-color: var(--accent-gold);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(191, 149, 99, 0.2);
        }

        .result-box {
            margin-top: 40px;
            display: none;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-box label {
            color: var(--accent-gold);
            margin-top: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 1px dashed var(--accent-gold);
            background: #fdfdfd;
            border-radius: 0;
            font-family: inherit;
            font-size: 0.9rem;
            line-height: 1.6;
            resize: none;
            margin-bottom: 20px;
            box-sizing: border-box;
            color: var(--text-primary);
        }

        .action-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-copy,
        .btn-wa {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 0;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-copy {
            background-color: #f0f0f0;
            color: var(--text-primary);
        }

        .btn-copy:hover {
            background-color: #e5e5e5;
        }

        .btn-wa {
            background-color: #25D366;
            color: white;
        }

        .btn-wa:hover {
            background-color: #20BA56;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: var(--accent-gold);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .generator-container {
                padding: 30px 20px;
            }

            h2 {
                font-size: 2rem;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div class="generator-container">
        <h2>Buku Tamu Cerdas</h2>
        <p class="subtitle">Generator Teks Undangan WhatsApp</p>

        <div class="form-group">
            <label for="guestName">Nama Tamu / Penerima:</label>
            <input type="text" id="guestName" placeholder="Contoh: Keluarga Bapak Budi" autocomplete="off">
        </div>

        <button class="btn-generate" onclick="generateLink()">Buat Link Undangan <i class="fas fa-magic"
                style="margin-left: 10px;"></i></button>

        <div class="result-box" id="resultBox">
            <label>Hasil Pesan WhatsApp:</label>
            <textarea id="resultText" readonly></textarea>

            <div class="action-buttons">
                <button class="btn-copy" onclick="copyText()">
                    <i class="fas fa-copy"></i> Salin Teks
                </button>
                <a href="#" class="btn-wa" id="btnWa" target="_blank">
                    <i class="fab fa-whatsapp"></i> Kirim ke WA
                </a>
            </div>
        </div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Undangan</a>
    </div>

    <script>
        function generateLink() {
            const rawName = document.getElementById('guestName').value.trim();
            if (!rawName) {
                alert("Harap masukkan nama tamu!");
                return;
            }

            // Get base URL
            let currentUrl = window.location.href.split(/[?#]/)[0];
            let baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
            if (!baseUrl.endsWith('/')) baseUrl += '/';

            // Redirect to index.html with param
            const invitationLink = `${baseUrl}index.html?to=${encodeURIComponent(rawName)}`;

            const messageTemplate = `Bismillahirrahmanirrahim.
Assalamu’alaikum Warahmatullahi Wabarakatuh.
 
Tanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i:

*${rawName}*

untuk hadir dan memberikan doa restu pada acara pernikahan kami:
Romeo & Juliet.

Berikut link undangan kami untuk info lengkap acara:
${invitationLink}
 
Merupakan suatu kehormatan dan kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan hadir di acara pernikahan kami.
 
Wassalamu’alaikum Warahmatullahi Wabarakatuh.
Terima Kasih.`;

            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');
            const btnWa = document.getElementById('btnWa');

            resultText.value = messageTemplate;
            resultBox.style.display = 'block';

            const waLink = `https://api.whatsapp.com/send?text=${encodeURIComponent(messageTemplate)}`;
            btnWa.href = waLink;

            // Scroll to results
            resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function copyText() {
            const resultText = document.getElementById('resultText');
            resultText.select();
            resultText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(resultText.value);

            const copyBtn = document.querySelector('.btn-copy');
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i class="fas fa-check"></i> Tersalin!';
            copyBtn.style.backgroundColor = '#d1fae5';
            copyBtn.style.color = '#065f46';

            setTimeout(() => {
                copyBtn.innerHTML = originalText;
                copyBtn.style.backgroundColor = '#f0f0f0';
                copyBtn.style.color = 'var(--text-primary)';
            }, 2000);
        }
    </script>
</body>

</html>
